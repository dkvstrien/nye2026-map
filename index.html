<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYE 2026 Group Houses — Comparison</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <h1>NYE 2026 Group Houses</h1>
        <p>30 hikers & skiers from Munich — finding the perfect base</p>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="cards">Cards</button>
        <button class="nav-tab" data-tab="map">Map</button>
        <button class="nav-tab" data-tab="table">Compare</button>
        <button class="nav-tab" data-tab="summary">Summary</button>
    </nav>

    <!-- CARDS VIEW -->
    <section id="cards" class="section active">
        <div class="controls">
            <span class="control-label">Sort:</span>
            <button class="filter-btn active" data-sort="rank">Rank</button>
            <button class="filter-btn" data-sort="beds">Beds</button>
            <button class="filter-btn" data-sort="driveKm">Drive</button>
            <button class="filter-btn" data-sort="pisteKm">Ski area</button>
            <button class="filter-btn" data-sort="price-low">Price</button>
            <span class="control-label" style="margin-left:1rem">Filter:</span>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="30plus">30+ beds</button>
            <button class="filter-btn" data-filter="viable">Viable only</button>
        </div>
        <div class="cards-grid" id="cards-grid"></div>
    </section>

    <!-- MAP VIEW -->
    <section id="map-section" class="section">
        <div id="map-container"></div>
    </section>

    <!-- TABLE VIEW -->
    <section id="table" class="section">
        <div class="comparison-table-wrapper">
            <table class="comparison-table" id="comparison-table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- SUMMARY VIEW -->
    <section id="summary" class="section">
        <h2>Quick Picks</h2>
        <div class="summary-grid" id="summary-picks"></div>
        <h2 style="margin-top:1.5rem">Key Findings</h2>
        <div id="summary-findings"></div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script>
    // ============ COLOR HELPERS ============
    function tierColor(tier) {
        return { top: '#16a34a', solid: '#f59e0b', new: '#2563eb', issue: '#dc2626' }[tier] || '#94a3b8';
    }
    function tierLabel(tier) {
        return { top: 'Top Pick', solid: 'Solid', new: 'New', issue: 'Issues' }[tier] || '';
    }
    function scoreColor(score) {
        if (!score) return '#94a3b8';
        if (score >= 34) return '#16a34a';
        if (score >= 28) return '#f59e0b';
        return '#dc2626';
    }

    // ============ NAV ============
    let mapInitialized = false;
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            const section = document.getElementById(target === 'map' ? 'map-section' : target);
            section.classList.add('active');
            if (target === 'map' && !mapInitialized) { initMap(); mapInitialized = true; }
        });
    });

    // ============ CARDS ============
    let currentSort = 'rank';
    let currentFilter = 'all';

    function sortHouses(arr, key) {
        return [...arr].sort((a, b) => {
            if (key === 'rank') {
                const ar = a.rank || 99, br = b.rank || 99;
                return ar - br;
            }
            if (key === 'beds') return (b.beds || 0) - (a.beds || 0);
            if (key === 'driveKm') return (a.driveKm || 999) - (b.driveKm || 999);
            if (key === 'pisteKm') return (b.pisteKm || 0) - (a.pisteKm || 0);
            if (key === 'price-low') {
                // Sort "on request" last
                const pa = a.price.includes('request') ? 9999 : parseInt(a.price.replace(/[^\d]/g, ''));
                const pb = b.price.includes('request') ? 9999 : parseInt(b.price.replace(/[^\d]/g, ''));
                return pa - pb;
            }
            return 0;
        });
    }

    function filterHouses(arr, filter) {
        if (filter === '30plus') return arr.filter(h => h.beds >= 30);
        if (filter === 'viable') return arr.filter(h => !h.dealbreaker);
        return arr;
    }

    function renderCards() {
        const grid = document.getElementById('cards-grid');
        let sorted = sortHouses(houses, currentSort);
        sorted = filterHouses(sorted, currentFilter);

        grid.innerHTML = sorted.map(h => {
            const color = tierColor(h.tier);
            const imgStyle = h.image
                ? `background-image: url('${h.image}')`
                : `background: linear-gradient(135deg, ${color}22, ${color}44)`;

            const amenities = [
                h.sauna ? `<span title="Sauna">🧖</span>` : '',
                h.ensuite ? `<span title="Ensuite rooms">🚿</span>` : '',
                h.gameRoom ? `<span title="Game room">🎯</span>` : '',
                h.wifi ? `<span title="WiFi">📶</span>` : '',
                h.parking ? `<span title="Parking">🅿️</span>` : '',
            ].filter(Boolean).join(' ');

            const bedsClass = h.beds >= 30 ? '' : ' style="color:#dc2626"';
            const bedsNote = h.beds < 25 ? ' (too small!)' : h.beds < 30 ? ' (tight)' : '';

            const scoreBar = h.score
                ? `<div class="score-bar">
                     <span>${h.score}/45</span>
                     <div class="score-fill"><div class="score-fill-inner" style="width:${(h.score/45*100)}%;background:${scoreColor(h.score)}"></div></div>
                   </div>`
                : '<span style="color:#64748b;font-size:12px">Not yet scored</span>';

            const dealbreakerHtml = h.dealbreaker
                ? `<div class="card-dealbreaker">⛔ ${h.dealbreaker}</div>`
                : '';

            return `
                <div class="house-card ${h.dealbreaker ? 'dealbreaker' : ''}">
                    <div class="card-image" style="${imgStyle}">
                        ${h.rank ? `<div class="rank-badge" style="background:${color}">#${h.rank}</div>` : ''}
                        <div class="tier-label" style="background:${color}">${tierLabel(h.tier)}</div>
                    </div>
                    <div class="card-body">
                        <h3>${h.name}</h3>
                        <div class="card-location">${h.location}, ${h.country} · ${h.elevation}</div>
                        <div class="card-stats">
                            <div class="stat"><span class="stat-icon">🛏️</span><span${bedsClass}>${h.beds} beds${bedsNote}</span></div>
                            <div class="stat"><span class="stat-icon">🚗</span> ${h.drive} (${h.driveKm}km)</div>
                            <div class="stat"><span class="stat-icon">⛷️</span> ${h.pisteKm}km piste</div>
                            <div class="stat"><span class="stat-icon">💰</span> ${h.price}</div>
                            <div class="stat"><span class="stat-icon">🚂</span> ${h.trainTime} (${h.trainChanges}x)</div>
                            <div class="stat">${amenities || '<span style="opacity:0.4">No extras listed</span>'}</div>
                        </div>
                        <div class="card-pros">✅ ${h.strengths}</div>
                        <div class="card-cons">⚠️ ${h.warnings}</div>
                        ${dealbreakerHtml}
                    </div>
                    <div class="card-footer">
                        <a href="${h.link}" target="_blank">View listing →</a>
                        ${scoreBar}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Sort buttons
    document.querySelectorAll('[data-sort]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = btn.dataset.sort;
            renderCards();
        });
    });

    // Filter buttons
    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderCards();
        });
    });

    renderCards();

    // ============ MAP ============
    function initMap() {
        const munich = { lat: 48.1351, lng: 11.5820 };
        const map = L.map('map-container').setView([47.5, 11.5], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        // Munich
        const munichIcon = L.divIcon({
            html: '<div style="background:#1e40af;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">M</div>',
            className: '', iconSize: [32, 32], iconAnchor: [16, 16]
        });
        L.marker([munich.lat, munich.lng], { icon: munichIcon }).addTo(map).bindPopup('<strong>Munich</strong><br>Starting point');

        houses.forEach(h => {
            const color = tierColor(h.tier);
            L.polyline([[munich.lat, munich.lng], [h.lat, h.lng]], {
                color, weight: 1.5, opacity: 0.3, dashArray: '6 4'
            }).addTo(map);

            const label = h.rank || '?';
            const icon = L.divIcon({
                html: `<div style="background:${color};color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${label}</div>`,
                className: '', iconSize: [28, 28], iconAnchor: [14, 14]
            });

            const db = h.dealbreaker ? `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:4px 8px;margin-top:6px;font-size:12px;color:#991b1b;">⛔ ${h.dealbreaker}</div>` : '';

            L.marker([h.lat, h.lng], { icon }).addTo(map).bindPopup(`
                <div style="max-width:300px;line-height:1.5">
                    <h3 style="margin:0 0 4px;font-size:15px">${h.rank ? `<span style="background:${color};color:white;border-radius:12px;padding:1px 8px;font-size:12px;margin-right:6px">#${h.rank}</span>` : ''}${h.name}</h3>
                    <div style="color:#888;font-size:13px;margin-bottom:8px">${h.location} · ${h.elevation} · ${h.beds} beds</div>
                    <div style="font-size:13px;margin-bottom:4px"><strong>Drive:</strong> ${h.drive} · <strong>Train:</strong> ${h.trainTime}</div>
                    <div style="font-size:13px;margin-bottom:4px"><strong>Skiing:</strong> ${h.skiArea} — ${h.pisteKm}km</div>
                    <div style="font-size:13px;margin-bottom:4px"><strong>Price:</strong> ${h.price}</div>
                    <div style="color:#16a34a;font-size:13px">✅ ${h.strengths}</div>
                    <div style="color:#dc2626;font-size:13px">⚠️ ${h.warnings}</div>
                    ${db}
                    <div style="margin-top:6px;font-size:12px"><a href="${h.link}" target="_blank" style="color:#2563eb">View listing →</a></div>
                </div>
            `, { maxWidth: 340 });
        });

        // Legend
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Houses</h4>
                <div class="legend-item"><span class="dot" style="background:#16a34a"></span> Top picks</div>
                <div class="legend-item"><span class="dot" style="background:#f59e0b"></span> Solid options</div>
                <div class="legend-item"><span class="dot" style="background:#2563eb"></span> New (unscored)</div>
                <div class="legend-item"><span class="dot" style="background:#dc2626"></span> Issues</div>
                <div class="legend-item"><span class="dot" style="background:#1e40af"></span> Munich</div>
            `;
            return div;
        };
        legend.addTo(map);

        const allPoints = [[munich.lat, munich.lng], ...houses.map(h => [h.lat, h.lng])];
        map.fitBounds(allPoints, { padding: [40, 40] });
    }

    // ============ TABLE ============
    const columns = [
        { key: 'name', label: 'Name', format: (h) => `<span class="name-col">${h.name}</span>` },
        { key: 'location', label: 'Location' },
        { key: 'beds', label: 'Beds', numeric: true },
        { key: 'drive', label: 'Drive' },
        { key: 'trainTime', label: 'Train' },
        { key: 'skiArea', label: 'Ski Area' },
        { key: 'pisteKm', label: 'Piste (km)', numeric: true },
        { key: 'dayPass', label: 'Day Pass' },
        { key: 'price', label: 'Price' },
        { key: 'sauna', label: 'Sauna', format: (h) => h.sauna ? '✓' : '—' },
        { key: 'ensuite', label: 'Ensuite', format: (h) => h.ensuite ? '✓' : '—' },
        { key: 'gameRoom', label: 'Games', format: (h) => h.gameRoom ? '✓' : '—' },
        { key: 'score', label: 'Score', numeric: true, format: (h) => h.score ? `${h.score}/45` : '—' },
    ];

    let tableSortKey = 'rank';
    let tableSortAsc = true;

    function renderTable() {
        const thead = document.querySelector('#comparison-table thead');
        const tbody = document.querySelector('#comparison-table tbody');

        thead.innerHTML = '<tr>' + columns.map(c =>
            `<th data-key="${c.key}">${c.label} <span class="sort-arrow">${tableSortKey === c.key ? (tableSortAsc ? '▲' : '▼') : '↕'}</span></th>`
        ).join('') + '</tr>';

        let sorted = [...houses].sort((a, b) => {
            const key = tableSortKey;
            const col = columns.find(c => c.key === key);
            let av = a[key], bv = b[key];
            if (col && col.numeric) {
                av = Number(av) || 0; bv = Number(bv) || 0;
            } else {
                av = String(av || ''); bv = String(bv || '');
            }
            const cmp = av < bv ? -1 : av > bv ? 1 : 0;
            return tableSortAsc ? cmp : -cmp;
        });

        tbody.innerHTML = sorted.map(h => {
            const color = tierColor(h.tier);
            return '<tr style="border-left: 3px solid ' + color + '">' + columns.map(c => {
                const val = c.format ? c.format(h) : (h[c.key] ?? '—');
                return `<td>${val}</td>`;
            }).join('') + '</tr>';
        }).join('');

        // Re-bind sort clicks
        thead.querySelectorAll('th').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.key;
                if (tableSortKey === key) tableSortAsc = !tableSortAsc;
                else { tableSortKey = key; tableSortAsc = true; }
                renderTable();
            });
        });
    }
    renderTable();

    // ============ SUMMARY ============
    function renderSummary() {
        const viable30 = houses.filter(h => h.beds >= 30 && !h.dealbreaker);
        const scored = houses.filter(h => h.score).sort((a, b) => b.score - a.score);
        const bigSki = [...houses].sort((a, b) => (b.pisteKm || 0) - (a.pisteKm || 0));
        const closeDrive = [...houses].filter(h => !h.dealbreaker).sort((a, b) => (a.driveKm || 999) - (b.driveKm || 999));

        const picks = [
            { title: '🏆 Best Overall', pick: scored[0]?.name || 'TBD', reason: `Score ${scored[0]?.score}/45. ${scored[0]?.strengths?.split(',')[0]}` },
            { title: '⛷️ Best Skiing', pick: bigSki[0]?.name || 'TBD', reason: `${bigSki[0]?.pisteKm}km of piste — ${bigSki[0]?.skiArea}` },
            { title: '🚗 Easiest Drive', pick: closeDrive[0]?.name || 'TBD', reason: `${closeDrive[0]?.drive} / ${closeDrive[0]?.driveKm}km from Munich` },
            { title: '💰 Best Value', pick: 'Franzls Hütte', reason: '€18-25/pp/night, 75km skiing, but only 28 beds' },
            { title: '👥 Best for 30 ppl', pick: viable30.sort((a,b) => (b.score||0) - (a.score||0))[0]?.name || 'TBD', reason: `${viable30[0]?.beds} beds, viable for the full group` },
            { title: '🏔️ Best Hiking', pick: 'KSJ-Freizeithaus Pfelders', reason: 'Highest village (1632m), Texelgruppe Natural Park' },
        ];

        document.getElementById('summary-picks').innerHTML = picks.map(p => `
            <div class="summary-card">
                <h4>${p.title}</h4>
                <div class="pick">${p.pick}</div>
                <div class="reason">${p.reason}</div>
            </div>
        `).join('');

        const findings = [
            { icon: '⛔', text: '<strong>Bergheim Maria Trost</strong> — no car access in winter. Ruled out.' },
            { icon: '⛔', text: '<strong>Höllwart</strong> — ski lifts permanently closed + no party groups. Ruled out.' },
            { icon: '⚠️', text: '<strong>Maroldenhof (24), Franzls Hütte (28)</strong> — too few beds for 30 people.' },
            { icon: '💡', text: '<strong>Saalbach ski pass</strong> is €425/6-day — significantly more expensive than other areas.' },
            { icon: '💡', text: '<strong>Ski Amadé</strong> (Schrempfhof) offers 760km for ~€300/6-day — best km-per-euro.' },
            { icon: '💡', text: '<strong>SkiWelt</strong> (Brixen) has 280km and is only 1h30 drive from Munich.' },
            { icon: '📅', text: 'All shops closed Jan 1. Dec 31 closes early (14:00-17:00). Stock up by Dec 30.' },
            { icon: '🆕', text: '6 new houses added — not yet scored. Brixen, Zillertal, Tuxertal, Krimml, Schrempfhof, Alpenglück.' },
        ];

        document.getElementById('summary-findings').innerHTML = '<div style="background:white;border-radius:12px;border:1px solid #e2e8f0;padding:1rem 1.25rem">' +
            findings.map(f => `<div style="padding:0.5rem 0;border-bottom:1px solid #f1f5f9;font-size:0.9rem">${f.icon} ${f.text}</div>`).join('') +
            '</div>';
    }
    renderSummary();
    </script>
</body>
</html>
